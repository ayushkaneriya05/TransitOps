<form method="post" class="space-y-4 p-6">{% csrf_token %}{% for field in form %}<div><label for="{{ field.id_for_label }}" class="block text-sm font-medium text-slate-700 mb-1">{{ field.label }}</label>{{ field }}{% if field.errors %}<p class="text-red-600 text-xs mt-1">{{ field.errors.0 }}</p>{% endif %}</div>{% endfor %}<button type="submit" class="btn-primary">Create Trip</button></form>
