{% load static %}
<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In — TransitOps</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        font-family: "Inter", system-ui, sans-serif;
      }

      .login-bg {
        background: linear-gradient(
          135deg,
          #0f172a 0%,
          #1e293b 30%,
          #1e3a5f 60%,
          #0f172a 100%
        );
        position: relative;
        overflow: hidden;
      }
      .login-bg::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          radial-gradient(
            ellipse at 30% 20%,
            rgba(59, 130, 246, 0.15) 0%,
            transparent 50%
          ),
          radial-gradient(
            ellipse at 70% 80%,
            rgba(139, 92, 246, 0.1) 0%,
            transparent 50%
          );
      }

      /* Floating orbs */
      .orb {
        position: absolute;
        border-radius: 50%;
        filter: blur(60px);
        animation: float 8s ease-in-out infinite;
      }
      .orb-1 {
        width: 300px;
        height: 300px;
        background: rgba(59, 130, 246, 0.12);
        top: 10%;
        left: 10%;
      }
      .orb-2 {
        width: 200px;
        height: 200px;
        background: rgba(139, 92, 246, 0.1);
        bottom: 20%;
        right: 15%;
        animation-delay: -3s;
      }
      .orb-3 {
        width: 250px;
        height: 250px;
        background: rgba(16, 185, 129, 0.08);
        top: 60%;
        left: 60%;
        animation-delay: -5s;
      }

      @keyframes float {
        0%,
        100% {
          transform: translate(0, 0) scale(1);
        }
        50% {
          transform: translate(20px, -20px) scale(1.05);
        }
      }

      /* Glass card */
      .glass-card {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        box-shadow:
          0 25px 50px rgba(0, 0, 0, 0.3),
          0 0 0 1px rgba(255, 255, 255, 0.1) inset;
      }

      /* Logo pulse */
      .logo-glow {
        animation: logoPulse 3s ease-in-out infinite;
      }
      @keyframes logoPulse {
        0%,
        100% {
          box-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
        }
        50% {
          box-shadow: 0 0 40px rgba(59, 130, 246, 0.5);
        }
      }

      /* Input styles */
      .login-input {
        width: 100%;
        padding: 0.7rem 0.875rem 0.7rem 2.5rem;
        background: #f8fafc;
        border: 1.5px solid #e2e8f0;
        border-radius: 0.625rem;
        font-size: 0.875rem;
        color: #1e293b;
        transition: all 0.2s;
      }
      .login-input:focus {
        outline: none;
        background: white;
        border-color: #3b82f6;
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.12);
      }
      .login-input::placeholder {
        color: #94a3b8;
      }

      /* Submit button */
      .login-btn {
        width: 100%;
        padding: 0.7rem;
        background: linear-gradient(
          135deg,
          #2563eb 0%,
          #1d4ed8 50%,
          #1e40af 100%
        );
        color: white;
        font-weight: 600;
        font-size: 0.875rem;
        border: none;
        border-radius: 0.625rem;
        cursor: pointer;
        transition: all 0.2s;
        position: relative;
        overflow: hidden;
      }
      .login-btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 8px 25px rgba(37, 99, 235, 0.35);
      }
      .login-btn:active {
        transform: translateY(0) scale(0.98);
      }

      /* Grid pattern */
      .grid-pattern {
        position: absolute;
        inset: 0;
        opacity: 0.03;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.1) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.1) 1px, transparent 1px);
        background-size: 40px 40px;
      }
    </style>
  </head>
  <body class="h-full login-bg flex items-center justify-center">
    <!-- Decorative elements -->
    <div class="grid-pattern"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="w-full max-w-[400px] px-4 relative z-10">
      <div class="glass-card rounded-2xl p-8">
        <!-- Logo -->
        <div class="text-center mb-7">
          <div
            class="inline-flex items-center justify-center w-14 h-14 rounded-2xl mb-4 logo-glow"
            style="
              background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            "
          >
            <svg
              class="w-7 h-7 text-white"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              stroke-width="2.5"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M13 10V3L4 14h7v7l9-11h-7z"
              />
            </svg>
          </div>
          <h1 class="text-2xl font-extrabold text-slate-900 tracking-tight">
            TransitOps
          </h1>
          <p class="text-sm text-slate-400 mt-1 font-medium">
            Fleet & Logistics Management System
          </p>
        </div>

        <!-- Form -->
        <form method="post" class="space-y-4">
          {% csrf_token %} {% if form.errors %}
          <div
            class="flex items-center gap-2.5 px-3.5 py-2.5 rounded-lg text-sm bg-red-50 border border-red-200 text-red-700"
          >
            <svg
              class="w-4 h-4 flex-shrink-0"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              stroke-width="2"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z"
              />
            </svg>
            Invalid credentials. Please try again.
          </div>
          {% endif %}

          <div class="relative">
            <label
              for="id_username"
              class="block text-xs font-semibold text-slate-600 mb-1.5 uppercase tracking-wide"
              >Username</label
            >
            <div class="relative">
              <svg
                class="w-4 h-4 text-slate-400 absolute left-3 top-1/2 -translate-y-1/2"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
                stroke-width="1.5"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"
                />
              </svg>
              <input
                type="text"
                name="username"
                id="id_username"
                class="login-input"
                placeholder="Enter your username"
                autofocus
              />
            </div>
          </div>

          <div class="relative">
            <div class="flex items-center justify-between mb-1.5">
              <label
                for="id_password"
                class="block text-xs font-semibold text-slate-600 uppercase tracking-wide"
                >Password</label
              >
              {% comment %}
              <a
                href="{% url 'accounts:password_reset' %}"
                class="text-xs font-medium text-blue-600 hover:text-blue-800 transition"
                >Forgot Password?</a
              >
              {% endcomment %}
            </div>
            <div class="relative">
              <svg
                class="w-4 h-4 text-slate-400 absolute left-3 top-1/2 -translate-y-1/2"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
                stroke-width="1.5"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z"
                />
              </svg>
              <input
                type="password"
                name="password"
                id="id_password"
                class="login-input"
                placeholder="Enter your password"
              />
            </div>
          </div>

          <button type="submit" class="login-btn mt-2">
            Sign In
            <svg
              class="w-4 h-4 inline-block ml-1"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              stroke-width="2"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3"
              />
            </svg>
          </button>
        </form>

        <!-- Footer -->
        <div
          class="mt-6 pt-5 border-t border-slate-100 text-center space-y-2.5"
        >
          <p class="text-xs text-slate-500">
            Don't have an account?
            <a
              href="{% url 'accounts:register' %}"
              class="text-blue-600 font-semibold hover:text-blue-800"
              >Create Account</a
            >
          </p>
        </div>
      </div>
    </div>
  </body>
</html>
