<!-- Trip Complete Modal Partial -->
<div class="modal-header">
    <h2>Complete Trip #{{ trip.pk }}</h2>
    <button class="modal-close" onclick="closeModal()" type="button">
        <svg class="w-4 h-4 text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
    </button>
</div>
<div class="modal-body">
    <div class="px-3 py-2.5 rounded-lg bg-blue-50 border border-blue-200 text-blue-800 text-sm mb-4">
        <strong>{{ trip.source }} → {{ trip.destination }}</strong><br>
        <span class="text-xs text-blue-600">Vehicle: {{ trip.vehicle.name }} · Driver: {{ trip.driver.name }}</span>
    </div>
    <form method="post" action="{{ action_url }}"
          hx-post="{{ action_url }}"
          hx-target="#modal-content"
          hx-swap="innerHTML">
        {% csrf_token %}
        {% if form.errors %}
        <div class="flex items-start gap-2 px-3 py-2.5 rounded-lg text-sm bg-red-50 border border-red-200 text-red-700 mb-4">
            <div>{% for error in form.odometer_end.errors %}<p>{{ error }}</p>{% endfor %}</div>
        </div>
        {% endif %}
        <div>
            <label class="block text-xs font-semibold text-slate-600 mb-1 uppercase tracking-wide">Final Odometer (km)</label>
            {{ form.odometer_end }}
        </div>
        <div class="flex gap-2 mt-5 pt-4 border-t border-slate-100">
            <button type="submit" class="btn btn-success flex-1">Mark Complete</button>
            <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        </div>
    </form>
</div>
