<form method="post" class="space-y-4 p-6">{% csrf_token %}<div class="p-3 bg-slate-50 rounded-lg text-sm text-slate-600 mb-2"><strong>Trip #{{ trip.pk }}</strong>: {{ trip.source }} → {{ trip.destination }}</div><div><label class="block text-sm font-medium text-slate-700 mb-1">Final Odometer Reading (km)</label>{{ form.odometer_end }}{% if form.odometer_end.errors %}<p class="text-red-600 text-xs mt-1">{{ form.odometer_end.errors.0 }}</p>{% endif %}</div><button type="submit" class="btn-success">Mark as Completed</button></form>
