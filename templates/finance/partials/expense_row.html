<tr>
    <td>{{ expense.vehicle.name }}</td>
    <td>{% if expense.trip %}<a href="{% url 'operations:trip_detail' expense.trip.pk %}" class="text-blue-600 hover:underline">#{{ expense.trip.pk }}</a>{% else %}—{% endif %}</td>
    <td><span class="pill pill-gray" style="font-size:10px">{{ expense.get_category_display }}</span></td>
    <td class="text-mono font-medium">₹{{ expense.cost|floatformat:2 }}</td>
    <td class="text-slate-500 text-xs">{{ expense.date }}</td>
    <td class="text-slate-500 text-xs truncate max-w-xs">{{ expense.notes|default:"—" }}</td>
</tr>
