{% extends "base.html" %}
{% block title %}Log Expense — FleetFlow{% endblock %}
{% block page_title %}Log Expense{% endblock %}
{% block content %}
<div class="max-w-2xl">
    <div class="card">
        <div class="p-6">
            <form method="post" class="space-y-4">{% csrf_token %}
                {% for field in form %}<div><label for="{{ field.id_for_label }}" class="block text-xs font-semibold text-slate-600 mb-1.5 uppercase tracking-wide">{{ field.label }}</label>{{ field }}{% if field.errors %}<p class="text-red-600 text-xs mt-1">{{ field.errors.0 }}</p>{% endif %}</div>{% endfor %}
                <div class="flex gap-2.5 pt-3 border-t border-slate-100 mt-5"><button type="submit" class="btn btn-primary">Log Expense</button><a href="{% url 'finance:expense_list' %}" class="btn btn-secondary">Cancel</a></div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
